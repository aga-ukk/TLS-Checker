name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Force Install Gradle 8.1.1 Manually
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.1.1-bin.zip
        sudo unzip -q gradle-8.1.1-bin.zip -d /opt
        echo "/opt/gradle-8.1.1/bin" >> $GITHUB_PATH

    - name: Build APK Directly with Forced Version
      run: gradle assembleDebug

    - name: Upload APK Result
      uses: actions/upload-artifact@v4
      with:
        name: TLS-Checker-APK
        path: app/build/outputs/apk/debug/app-debug.apk
